services:

  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  auth:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    working_dir: /app/auth_service
    volumes:
      - ./auth_service:/app/auth_service
    ports:
      - "8001:8001"
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    depends_on:
      - mongo
    restart: on-failure

  stock:
    build:
      context: .
      dockerfile: stock_service/Dockerfile
    working_dir: /app/stock_service
    volumes:
      - ./stock_service:/app/stock_service
    ports:
      - "8002:8002"
    command: uvicorn main:app --host 0.0.0.0 --port 8002

  model:
    image: stock-backend:latest   # your previously built model service
    ports:
      - '8000:8000'

volumes:
  mongo_data:

