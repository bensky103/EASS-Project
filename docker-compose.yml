services:

  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  auth:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    working_dir: /app/auth_service
    volumes:
      - ./auth_service:/app/auth_service
    ports:
      - "8001:8001"
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    depends_on:
      - mongo
    restart: on-failure

  stock:
    build:
      context: .
      dockerfile: stock_service/Dockerfile
    working_dir: /app/stock_service
    volumes:
      - ./stock_service:/app/stock_service
    ports:
      - "8002:8002"
    command: uvicorn main:app --host 0.0.0.0 --port 8002

  model:
    build:                       # ← use your model Dockerfile
      context: .
      dockerfile: app/Dockerfile
    working_dir: /app            # /app is where main.py lives
    volumes:
      - ./app:/app               # hot‑reload code without rebuilds
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    working_dir: /code
    depends_on:
      - auth
      - stock
      - model
    # run once, then exit; no need for ports or volumes
    restart: "no"

volumes:
  mongo_data:

