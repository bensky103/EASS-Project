#docker-compose.yml

services:

  mongo:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    env_file:
      - .env
  
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    env_file:
      - .env

  stock_data_fetching:
    build:
      context: .
      dockerfile: stock_data_fetching/Dockerfile
    working_dir: /app
    container_name: stock_data_fetching
    ports:
      - "8002:8000"
    volumes:
      - ./stock_data_fetching:/app
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c",
         "import sys, urllib.request as r; \
          sys.exit(0 if r.urlopen('http://localhost:8000/health').getcode()==200 else 1)"]
      interval: 5s
      timeout: 2s
      retries: 5
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    working_dir: /app
    container_name: auth_service
    volumes:
      - ./auth_service:/app/auth_service
    ports:
      - "8001:8001"
    command: uvicorn auth_service.main:app --host 0.0.0.0 --port 8001
    depends_on:
      - redis
      - mongo
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c",
         "import sys, urllib.request as r; \
          sys.exit(0 if r.urlopen('http://localhost:8001/health').getcode()==200 else 1)"]
      interval: 5s
      timeout: 2s
      retries: 5

  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    working_dir: /code
    container_name: tests
    depends_on:
     auth:
       condition: service_healthy
     stock_data_fetching:
       condition: service_completed_successfully
    restart: "no"
    env_file:
      - .env

volumes:
  mongo_data:

